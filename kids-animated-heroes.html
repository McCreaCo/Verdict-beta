<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERDICT — Animated Heroes</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #09080a; color: #f0eaf8; font-family: Georgia, 'Times New Roman', serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  #app { width: 100%; max-width: 560px; min-height: 100vh; display: flex; flex-direction: column; }
  header { padding: 16px 20px 12px; border-bottom: 1px solid #22182a; display: flex; align-items: center; justify-content: space-between; background: #0e0b14; }
  .title { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; color: #a8d83a; }
  .subtitle { font-size: 9px; color: #6a9018; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
  .counter { font-size: 10px; color: #2e2040; background: #14101c; border: 1px solid #22182a; border-radius: 16px; padding: 4px 10px; }
  .back-btn { background: transparent; border: 1px solid #22182a; border-radius: 8px; padding: 5px 10px; color: #3a2850; font-size: 11px; cursor: pointer; font-family: Georgia, serif; }
  #main { flex: 1; padding: 14px 0; }
  .core-q { text-align: center; font-size: 12px; color: #a8d83a; font-style: italic; padding: 4px 20px 0; line-height: 1.4; }
  .bracket-cols { display: flex; gap: 3px; padding: 0 10px; }
  .bracket-col { display: flex; flex-direction: column; flex: 1; min-width: 0; }
  .col-label { font-size: 7px; letter-spacing: 1.5px; text-transform: uppercase; text-align: center; margin-bottom: 5px; }
  .col-matches { display: flex; flex-direction: column; justify-content: space-around; height: 380px; }
  .match-cell { border-radius: 5px; overflow: hidden; cursor: default; flex: 1; transition: border-color 0.2s; }
  .match-cell.active { border: 1px solid #a8d83a !important; background: #14101c !important; cursor: pointer; }
  .match-cell.done { border: 1px solid #2e1e2a !important; background: #0e0b14 !important; cursor: pointer; }
  .match-cell.empty { border: 1px solid #14101c; background: #09080a; }
  .match-row { display: flex; align-items: center; gap: 2px; padding: 2px 3px; transition: opacity 0.3s; }
  .match-row.loser { opacity: 0.22; }
  .match-row.winner { background: rgba(168,216,58,0.12); }
  .match-row .em { font-size: 8px; }
  .match-row .nm { font-size: 7px; color: #3a2850; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 400; }
  .match-row.winner .nm { color: #a8d83a; font-weight: 700; }
  .match-divider { border: none; border-top: 1px solid #1e1428; margin: 0; }
  .tbd { padding: 2px 3px; font-size: 6px; color: #221830; }
  .vote-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #a8d83a, #6a9018); border: none; border-radius: 12px; color: #09080a; font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: 1px; font-family: Georgia, serif; margin-top: 14px; }
  .vote-hint { font-size: 10px; color: #6a6478; text-align: center; margin-top: 6px; }
  #vote-screen { padding: 0 16px; animation: fadeUp 0.3s ease; }
  .vote-header { text-align: center; margin-bottom: 16px; }
  .round-label { font-size: 10px; letter-spacing: 3px; color: #a8d83a; text-transform: uppercase; margin-bottom: 3px; }
  .vote-hint-text { font-size: 11px; color: #8a8298; letter-spacing: 1px; }
  .card { display: block; width: 100%; margin-bottom: 10px; border-radius: 14px; padding: 16px 18px; cursor: pointer; text-align: left; transition: all 0.25s; position: relative; overflow: hidden; border: 2px solid #22182a; background: #0e0b14; }
  .card.selected { border-color: #a8d83a !important; background: #1a1020 !important; transform: scale(1.01); }
  .card-inner { position: relative; z-index: 1; }
  .card-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
  .card-emoji { font-size: 34px; margin-top: 2px; flex-shrink: 0; }
  .card-meta { font-size: 9px; color: #6a9018; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
  .card-name { font-size: 18px; font-weight: 700; color: #d8d2e2; line-height: 1.2; margin-bottom: 2px; transition: color 0.2s; }
  .card.selected .card-name { color: #ffffff; }
  .card-from { font-size: 10px; color: #8a8298; font-style: italic; transition: color 0.2s; }
  .card.selected .card-from { color: #8a8298; }
  .card-tag { display: inline-block; margin-top: 8px; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; background: #22182a; color: #a8d83a; letter-spacing: 1px; }
  .card.selected .card-tag { background: #a8d83a; color: #09080a; }
  .card-stats { margin-top: 8px; font-size: 9px; color: #9a8aa0; letter-spacing: 0.5px; }
  .card.selected .card-stats { color: #9a8aa0; }
  .card-fact { font-size: 12px; color: #7e7888; line-height: 1.75; transition: color 0.2s; margin-top: 8px; }
  .card.selected .card-fact { color: #e8e2f0; }
  .card-arrow { font-size: 16px; color: #a8d83a; margin-left: auto; flex-shrink: 0; }
  .card-pct { font-size: 20px; font-weight: 700; color: #a8d83a; margin-top: 10px; }
  .card-pct span { font-size: 12px; font-weight: 400; color: #3a2850; margin-left: 6px; }
  .card-pct .check { color: #a8d83a; margin-left: 8px; }
  .pct-bar { position: absolute; top: 0; left: 0; height: 100%; background: rgba(168,216,58,0.06); transition: width 0.9s cubic-bezier(.4,0,.2,1); z-index: 0; }
  .commit-box { padding: 14px 18px; background: #0e0b14; border: 1px solid #22182a; border-radius: 12px; text-align: center; animation: fadeUp 0.3s ease; }
  .commit-hint { font-size: 11px; color: #3a2850; margin-bottom: 10px; font-style: italic; }
  .commit-btn { padding: 12px 32px; background: linear-gradient(135deg, #a8d83a, #6a9018); border: none; border-radius: 10px; color: #09080a; font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: 1px; font-family: Georgia, serif; }
  .result-box { padding: 16px 18px; background: #0e0b14; border: 1px solid #22182a; border-radius: 12px; text-align: center; margin-top: 2px; animation: fadeUp 0.3s ease; }
  .result-majority { font-size: 13px; color: #7ec8a0; font-weight: 700; letter-spacing: 1px; }
  .result-minority { font-size: 13px; color: #6a9018; font-weight: 700; letter-spacing: 1px; }
  .next-btn { width: 100%; margin-top: 14px; padding: 14px; background: linear-gradient(135deg, #a8d83a, #6a9018); border: none; border-radius: 12px; color: #09080a; font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: 1px; font-family: Georgia, serif; }
  #champion-screen { text-align: center; padding: 36px 24px; animation: fadeUp 0.5s ease; }
  .champ-emoji { font-size: 76px; margin-bottom: 8px; }
  .champ-trophy { font-size: 11px; letter-spacing: 4px; color: #a8d83a; text-transform: uppercase; margin-bottom: 8px; }
  .champ-name { font-size: 26px; font-weight: 700; color: #f0eaf8; margin-bottom: 4px; }
  .champ-from { font-size: 13px; color: #6a9018; font-style: italic; margin-bottom: 4px; }
  .champ-fact { font-size: 13px; color: #8a7d98; font-style: italic; max-width: 310px; margin: 14px auto 28px; line-height: 1.8; }
  .reset-btn { padding: 14px 32px; background: linear-gradient(135deg, #a8d83a, #6a9018); border: none; border-radius: 12px; color: #09080a; font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: 1px; font-family: Georgia, serif; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  button:active { filter: brightness(0.88); }
</style>
</head>

<div id="app">
  <header>
    <div>
      <a href="index.html" class="title" style="text-decoration:none;cursor:pointer" title="All brackets">VERDICT</a>

    </div>
    <div style="display:flex;gap:8px;align-items:center">

<script>

const ALL = [{"id": 0, "name": "Moana", "from": "Moana · 2016", "emoji": "🌊", "div": "Disney Royals", "seed": 1, "stats": "", "fact": "She's the rare Disney lead with no love interest and no villain to defeat — just a girl, an ocean, and a continent's worth of lost wayfinding to restore. Moana sails past the reef her whole island was too scared to cross, and the movie lets her be wrong, stuck, and still the only one who can fix it."}, {"id": 1, "name": "Elsa", "from": "Frozen · 2013", "emoji": "❄", "div": "Disney Royals", "seed": 2, "stats": "", "fact": "A hero who spends the first movie as the 'villain' everyone fears, then turns out to be a scared kid who just needed to stop hiding. Elsa's whole arc is learning that control isn't the same as safety — and she got the most-belted song of a generation as proof."}, {"id": 2, "name": "Anna", "from": "Frozen · 2013", "emoji": "💛", "div": "Disney Royals", "seed": 3, "stats": "", "fact": "The actual hero of Frozen, if you're keeping score: Anna does the running, the climbing, and the freezing-solid sacrifice while Elsa gets the ballads. She loves people who don't love her back yet and keeps going anyway — a tougher kind of brave than ice powers."}, {"id": 3, "name": "Raya", "from": "Raya and the Last Dragon · 2021", "emoji": "🗡", "div": "Disney Royals", "seed": 4, "stats": "", "fact": "Raya carries a sword, a pill-bug steed named Tuk Tuk, and the heavy job of trusting people again after the world burned her once. Her arc is built on the hardest hero move there is — choosing to believe an enemy before they've earned it. A #4 only because her division is brutal."}, {"id": 4, "name": "Miguel", "from": "Coco · 2017", "emoji": "🎸", "div": "Pixar Feels", "seed": 1, "stats": "", "fact": "A kid who defies his family's ban on music and accidentally walks into the Land of the Dead to chase it. Miguel's quest turns from 'become a star' into 'make sure Grandpa isn't forgotten,' and that switch is what makes Coco wreck you every single time."}, {"id": 5, "name": "Joy", "from": "Inside Out · 2015", "emoji": "😊", "div": "Pixar Feels", "seed": 2, "stats": "", "fact": "Leading a hero who's literally one feeling inside a girl's head is a wild swing, and Joy carries it — bright, bossy, slowly learning she can't run the whole control panel alone. Her realization that Sadness has a job too is one of the smartest lessons any kids' movie ever snuck in."}, {"id": 6, "name": "Riley", "from": "Inside Out · 2015", "emoji": "🏒", "div": "Pixar Feels", "seed": 3, "stats": "", "fact": "Every other hero here fights dragons; Riley fights a cross-country move and a new school. Inside Out makes ordinary growing-up feel as high-stakes as any quest, and Riley's the one who has to actually live it while five emotions wrestle for the wheel."}, {"id": 7, "name": "Luca", "from": "Luca · 2021", "emoji": "🐟", "div": "Pixar Feels", "seed": 4, "stats": "", "fact": "A sea-monster boy who just wants a Vespa and a friend, hiding the fact that water turns him back into a scaled creature. Luca's heroism is quiet — the courage to be seen as what you actually are. 'Silenzio, Bruno!' is the best anti-anxiety mantra in animation."}, {"id": 8, "name": "Miles Morales", "from": "Spider-Verse · 2018", "emoji": "🕷", "div": "Masked Heroes", "seed": 1, "stats": "", "fact": "The Spider-Man who had to invent his own way of being Spider-Man — no instructions, no permission, just a leap of faith off a building before he could stick the landing. Miles made a generation believe the mask could fit anyone, and the movies are a visual earthquake on top of it."}, {"id": 9, "name": "Gwen Stacy", "from": "Spider-Verse · 2018", "emoji": "🥁", "div": "Masked Heroes", "seed": 2, "stats": "", "fact": "Spider-Woman from another dimension who drums, leads, and carries more quiet grief than any teenager should. Gwen's the one who shows up when Miles has no one, and Across the Spider-Verse hands her the emotional center of the whole multiverse."}, {"id": 10, "name": "Hiro Hamada", "from": "Big Hero 6 · 2014", "emoji": "🤖", "div": "Masked Heroes", "seed": 3, "stats": "", "fact": "A 14-year-old robotics genius who turns his grief into a superhero team and a huggable healthcare robot. Hiro could've used his brains for revenge and chooses to build something that helps instead — Big Hero 6's whole heart is that choice."}, {"id": 11, "name": "Elastigirl", "from": "Incredibles 2 · 2018", "emoji": "🦸", "div": "Masked Heroes", "seed": 4, "stats": "", "fact": "Helen Parr does the heavy lifting of Incredibles 2 while Bob stays home losing to new math. A mom who can stretch across a speeding train to save a city and still make it a parenting lesson — the most competent hero in her own movie by a mile."}, {"id": 12, "name": "Hiccup", "from": "How to Train Your Dragon · 2010", "emoji": "🐉", "div": "DreamWorks", "seed": 1, "stats": "", "fact": "He was supposed to kill the dragon. Instead he befriended it, lost a leg doing the right thing, and dragged a whole Viking village from war into friendship. Hiccup's three-movie arc is the most complete coming-of-age in animation — and Toothless is the best dragon ever drawn."}, {"id": 13, "name": "Po", "from": "Kung Fu Panda 2 · 2011", "emoji": "🐼", "div": "DreamWorks", "seed": 2, "stats": "", "fact": "A noodle-shop panda who becomes the Dragon Warrior not despite being a clumsy fanboy but because of it. Po's whole secret is that there is no secret — believing you're special is what makes you special. He fights like nobody his size has any right to."}, {"id": 14, "name": "Astrid", "from": "How to Train Your Dragon · 2010", "emoji": "🪓", "div": "DreamWorks", "seed": 3, "stats": "", "fact": "The best dragon-rider in Berk who had to watch the chief's kid get the title she trained for — and chose to mentor him instead of resent him. Astrid is competence without ego, which is rarer and harder than any of Hiccup's stunts."}, {"id": 15, "name": "Megamind", "from": "Megamind · 2010", "emoji": "👽", "div": "DreamWorks", "seed": 4, "stats": "", "fact": "A supervillain who wins, realizes he has no idea what to do next, and accidentally becomes the hero he spent his life fighting. Megamind is the smartest comedy in the DreamWorks lineup — proof that the bad guy was just a good guy who'd never been given the part."}, {"id": 16, "name": "Mirabel", "from": "Encanto · 2021", "emoji": "🕯", "div": "New Disney", "seed": 1, "stats": "", "fact": "The one kid in a family of superpowers who got no gift — and turns out to be the only one who can see the family is cracking. Mirabel's heroism is emotional repair, not magic, and Encanto made the whole planet argue about Bruno for a year straight."}, {"id": 17, "name": "Vanellope", "from": "Wreck-It Ralph · 2012", "emoji": "🏎", "div": "New Disney", "seed": 2, "stats": "", "fact": "A glitch nobody wanted, locked out of her own racing game, who turns the bug into her superpower and wins anyway. Vanellope's friendship with Ralph is the rare kids'-movie bond the sequel was brave enough to let change and grow up."}, {"id": 18, "name": "Wreck-It Ralph", "from": "Wreck-It Ralph · 2012", "emoji": "👊", "div": "New Disney", "seed": 3, "stats": "", "fact": "A video-game villain who's tired of being the bad guy and just wants a medal and a friend. Ralph game-hops through an entire arcade to prove he's more than his job — and learns the hard way that fixing your own loneliness can't mean breaking someone else's world."}, {"id": 19, "name": "Bruno", "from": "Encanto · 2021", "emoji": "🔮", "div": "New Disney", "seed": 4, "stats": "", "fact": "We don't talk about him — which is exactly the point. Bruno exiled himself to protect a family that feared his visions, living in the walls and watching over them anyway. A hero defined entirely by quiet, misunderstood love."}, {"id": 20, "name": "Judy Hopps", "from": "Zootopia · 2016", "emoji": "🐰", "div": "Zootopia & Co", "seed": 1, "stats": "", "fact": "The first bunny cop, underestimated by everyone, who cracks the biggest case in Zootopia while learning her own hidden prejudices the hard way. Judy's the rare kid-hero whose arc includes realizing she was part of the problem — and fixing it."}, {"id": 21, "name": "Nick Wilde", "from": "Zootopia · 2016", "emoji": "🦊", "div": "Zootopia & Co", "seed": 2, "stats": "", "fact": "A con-artist fox who learned young that the world had already decided he was sly, so why fight it — until Judy decides he's better than that. Nick's the sharpest, funniest hero here, and his cynicism cracking open is the best thing in the movie."}, {"id": 22, "name": "Mei Lee", "from": "Turning Red · 2022", "emoji": "🔴", "div": "Zootopia & Co", "seed": 3, "stats": "", "fact": "A 13-year-old who poofs into a giant red panda whenever she feels too much — which, at 13, is constantly. Turning Red made the messy, embarrassing, boy-band-loving reality of being a tween girl into a superpower worth keeping. Nobody had made that movie before."}, {"id": 23, "name": "Ember", "from": "Elemental · 2023", "emoji": "🔥", "div": "Zootopia & Co", "seed": 4, "stats": "", "fact": "A fire girl in a city that wasn't built for her, falling for a water guy she's literally not supposed to touch. Ember's temper is the whole point — Elemental is about a kid figuring out which parts of her family to carry and which to set down."}, {"id": 24, "name": "Mario", "from": "The Super Mario Bros. Movie · 2023", "emoji": "🍄", "div": "Pixel & Mischief", "seed": 1, "stats": "", "fact": "Eighty percent of the planet recognizes the mustache. The 2023 movie finally let the plumber be an actual hero — leaping through the Mushroom Kingdom, surviving Rainbow Road, and carrying the most successful video-game film ever made on those red overalls."}, {"id": 25, "name": "Gru", "from": "Despicable Me · 2010", "emoji": "🌙", "div": "Pixel & Mischief", "seed": 2, "stats": "", "fact": "He started as a supervillain trying to steal the moon and got out-maneuvered by three orphan girls who wanted a bedtime story. Gru's turn from cold-hearted schemer to soft-hearted dad — without ever losing the accent or the edge — launched a whole yellow empire."}, {"id": 26, "name": "Princess Peach", "from": "The Super Mario Bros. Movie · 2023", "emoji": "👑", "div": "Pixel & Mischief", "seed": 3, "stats": "", "fact": "Forget the tower — the 2023 movie's Peach trains Mario, drives the kart, and leads the Mushroom Kingdom's army herself. A long-overdue rewrite that turned the damsel into the one showing the hero the ropes."}, {"id": 27, "name": "Mr. Wolf", "from": "The Bad Guys · 2022", "emoji": "🐺", "div": "Pixel & Mischief", "seed": 4, "stats": "", "fact": "The leader of a crew of animal criminals who discovers that being good actually feels better than being feared. The Bad Guys is a heist movie for kids, and Mr. Wolf's the smooth-talking thief learning that the hardest con is convincing the world you've changed."}, {"id": 28, "name": "Poppy", "from": "Trolls · 2016", "emoji": "🌈", "div": "Song & Spirit", "seed": 1, "stats": "", "fact": "Relentlessly, almost annoyingly optimistic — and the movie's whole argument is that her brand of hope is a kind of strength, not naivety. Poppy leads a rescue into Bergen territory armed with nothing but songs and stubborn joy."}, {"id": 29, "name": "Branch", "from": "Trolls · 2016", "emoji": "🪕", "div": "Song & Spirit", "seed": 2, "stats": "", "fact": "The Troll who refused to sing, hoarded supplies in a survival bunker, and turned out to be right that danger was real — then learned Poppy was right that you still have to live. The grump-meets-sunshine pairing works because Branch's fear is genuine."}, {"id": 30, "name": "Asha", "from": "Wish · 2023", "emoji": "⭐", "div": "Song & Spirit", "seed": 3, "stats": "", "fact": "A girl who wishes on a star and gets a literal star as a sidekick, then takes on a king who hoards everyone's dreams. Wish reaches back to the wishing-star idea the whole Disney logo is built on — Asha's the origin of the thing you've seen a thousand times."}, {"id": 31, "name": "Wade", "from": "Elemental · 2023", "emoji": "💧", "div": "Song & Spirit", "seed": 4, "stats": "", "fact": "A water guy who cries at everything and feels his way through the world — which turns out to be exactly what buttoned-up Element City needs. Wade's emotional openness is the counterweight to Ember's fire, and the movie says feeling too much is a feature, not a bug."}];
const R1 = [[0, 3], [1, 2], [4, 7], [5, 6], [8, 11], [9, 10], [12, 15], [13, 14], [16, 19], [17, 18], [20, 23], [21, 22], [24, 27], [25, 26], [28, 31], [29, 30]];
const COUNTS = [16, 8, 4, 2, 1];
const NR = COUNTS.length, LASTR = NR-1, TOTAL = 31;
const RLABELS = ["Round of 32", "Round of 16", "Quarterfinal", "Semifinal", "The Final"];
const COLLABELS = ["R32", "R16", "QF", "SF", "Final"];
const HEIGHTS = [22, 30, 44, 70, 100];
const GAPS = [2, 5, 12, 28, 0];
const DIVNAMES = ["Disney Royals", "Pixar Feels", "Masked Heroes", "DreamWorks", "New Disney", "Zootopia & Co", "Pixel & Mischief", "Song & Spirit"];
const ASK_ROOM = ["Heart pick or 'objectively the best' pick?", "Which of these would you actually want as a friend?", "Who'd win in a real fight — and who'd win your vote anyway?", "Which hero did your family fight about the most?", "Sidekick energy sneaking into the hero bracket — who doesn't belong?"];
let results = COUNTS.map(n=>Array(n).fill(null));
let currentVote=null, selected=null, locked=false, askPrompt='';

function getC(r,mi,slot){
  if(r===0){const idx=R1[mi][slot];return ALL[idx];}
  const prevMi=mi*2+slot, prevW=results[r-1][prevMi];
  if(prevW===null)return null;
  return ALL.find(c=>c.id===prevW);
}
function getCurrentRound(){for(let r=0;r<NR;r++){for(let mi=0;mi<COUNTS[r];mi++){if(results[r][mi]===null){const a=getC(r,mi,0),b=getC(r,mi,1);if(a&&b)return r;}}}return LASTR;}
function getNextActive(){const cr=getCurrentRound();for(let mi=0;mi<COUNTS[cr];mi++){if(results[cr][mi]===null){const a=getC(cr,mi,0),b=getC(cr,mi,1);if(a&&b)return{round:cr,mi};}}return null;}
function totalVotes(){return results.flat().filter(v=>v!==null).length;}
function fakeA(a,b){return Math.min(86,Math.max(20,50+(b.id-a.id)%17+(a.id%4)*2));}

function render(){
  const done=results[LASTR][0]!==null;
  if(done){const w=ALL.find(c=>c.id===results[LASTR][0]);renderChampion(w);return;}
  if(currentVote!==null){renderVote();return;}
  renderBracket();
}

function renderBracket(){
  document.getElementById('back-btn').style.display='none';
  const cr=getCurrentRound(),next=getNextActive();
  let html='<div class="core-q">Who\'s the hero you\'d actually follow into the story?</div>';
  html+='<div class="bracket-cols">';
  for(let r=0;r<NR;r++){
    const count=COUNTS[r],maxH=HEIGHTS[r],gap=GAPS[r];
    html+='<div class="bracket-col"><div class="col-label" style="color:'+(r===cr?'#a8d83a':'#2e2040')+'">'+COLLABELS[r]+'</div><div class="col-matches" style="gap:'+gap+'px">';
    for(let mi=0;mi<count;mi++){
      const a=getC(r,mi,0),b=getC(r,mi,1),winner=results[r][mi];
      const active=r===cr&&winner===null&&a&&b,done=winner!==null;
      const cls=active?'active':done?'done':'empty';
      const onclick=(active||done)?'onclick="startVote('+r+','+mi+')"':'';
      html+='<div class="match-cell '+cls+'" style="max-height:'+maxH+'px;'+(!active&&!done?'border:1px solid #14101c':'')+'" '+onclick+'>';
      [a,b].forEach((c,si)=>{
        if(!c){html+='<div class="tbd">&mdash;</div>';return;}
        const isW=winner===c.id,isL=done&&!isW;
        const nm=c.name.split(' ').slice(0,r===0?2:3).join(' ');
        html+=(si===1?'<hr class="match-divider">':'')+'<div class="match-row '+(isW?'winner':isL?'loser':'')+'"><span class="em">'+c.emoji+'</span><span class="nm">'+nm+'</span></div>';
      });
      html+='</div>';
    }
    html+='</div></div>';
  }
  html+='</div>';
  if(next)html+='<div style="padding:14px 16px 0"><button class="vote-btn" onclick="startVote('+next.round+','+next.mi+')">Vote Next Matchup &rarr;</button><div class="vote-hint">Tap any highlighted match to vote</div></div>';
  document.getElementById('main').innerHTML=html;
}

function startVote(round,mi){currentVote={round,mi};selected=null;locked=false;const w=results[round][mi];if(w!==null){const a=getC(round,mi,0);selected=(a&&a.id===w)?'a':'b';}render();}

function renderVote(){
  document.getElementById('back-btn').style.display='block';
  const o=currentVote,round=o.round,mi=o.mi,a=getC(round,mi,0),b=getC(round,mi,1);
  if(!a||!b){showBracket();return;}
  const pA=fakeA(a,b),pB=100-pA,majority=selected?(selected==='a'?pA:pB)>=50:false;
  const hint=!selected?"— Who's the bigger hero? —":locked?"— Verdict locked! —":"— Tap to switch. Button to commit. —";
  let html='<div id="vote-screen"><div class="vote-header"><div class="round-label">'+RLABELS[round]+'</div><div class="vote-hint-text">'+hint+'</div></div>';
  [{side:'a',c:a,pct:pA},{side:'b',c:b,pct:pB}].forEach(function(o){
    const side=o.side,c=o.c,pct=o.pct,isSel=selected===side;
    html+='<div class="card'+(isSel?' selected':'')+'" onclick="selectCard(\''+side+'\')">';
    if(locked&&isSel)html+='<div class="pct-bar" style="width:'+pct+'%"></div>';
    html+='<div class="card-inner"><div class="card-top"><div class="card-emoji">'+c.emoji+'</div><div style="flex:1;min-width:0"><div class="card-meta">'+c.div+' · '+c.from+'</div><div class="card-name">'+c.name+'</div></div>'+(isSel&&!locked?'<div class="card-arrow">◀</div>':'')+'</div>';
    html+='<div class="card-tag">'+(c.seed===1?'#1 SEED':c.seed===2?'#2 SEED':c.seed===3?'#3 SEED':'#4 SEED')+'</div>';
    if(c.stats)html+='<div class="card-stats">📊 '+c.stats+'</div>';
    html+='<div class="card-fact">'+c.fact+'</div>';
    if(locked&&isSel)html+='<div class="card-pct">'+pct+'%<span>voted this hero</span><span class="check">✓</span></div>';
    html+='</div></div>';
  });
  if(selected&&!locked)html+='<div class="commit-box"><div class="commit-hint">Still deciding? Tap the other card to compare.</div><button class="commit-btn" onclick="commitVote()">Lock In Verdict &rarr;</button></div>';
  if(locked){
    html+='<div class="result-box"><div class="'+(majority?'result-majority':'result-minority')+'">'+(majority?'✓ With the majority':'🔥 Against the crowd')+'</div><div class="ask-room" style="margin-top:14px;padding-top:14px;border-top:1px dashed #3a2850"><div style="font-size:9px;letter-spacing:3px;color:#6a9018;text-transform:uppercase;margin-bottom:6px">Ask the Room</div><div style="font-size:15px;color:#e8d8f0;font-style:italic;line-height:1.4">'+askPrompt+'</div></div></div><button class="next-btn" onclick="advance()">Vote Next Matchup &rarr;</button>';
  }
  html+='</div>';
  document.getElementById('main').innerHTML=html;
}

function selectCard(side){if(locked)return;selected=side;renderVote();}
function commitVote(){
  if(!selected||locked)return;
  locked=true;
  askPrompt=ASK_ROOM[Math.floor(Math.random()*ASK_ROOM.length)];
  const o=currentVote,round=o.round,mi=o.mi,a=getC(round,mi,0),b=getC(round,mi,1);
  results[round][mi]=selected==='a'?a.id:b.id;
  renderVote();
  document.getElementById('counter').textContent=totalVotes()+'/'+TOTAL;
}
function advance(){currentVote=null;locked=false;selected=null;render();}
function showBracket(){currentVote=null;selected=null;locked=false;render();}
function renderChampion(c){
  document.getElementById('back-btn').style.display='none';
  document.getElementById('main').innerHTML='<div id="champion-screen"><div style="font-size:44px;margin-bottom:6px">🏆</div><div class="champ-emoji">'+c.emoji+'</div><div class="champ-trophy">The Hero Stands Alone</div><div class="champ-name">'+c.name+'</div><div class="champ-from">'+c.from+'</div><div style="display:inline-block;margin:10px 0 6px;padding:4px 16px;border-radius:20px;background:#a8d83a;color:#09080a;font-size:11px;font-weight:700;letter-spacing:1px">YOUR VERDICT</div><div class="champ-fact">'+c.fact+'</div><button class="reset-btn" onclick="resetGame()">Run It Back</button><div style="margin-top:20px"><a href="index.html" style="color:#6a6478;font-size:12px;letter-spacing:2px;text-transform:uppercase;text-decoration:none;font-family:Georgia,serif">← All Brackets</a></div></div>';
}
function resetGame(){results=COUNTS.map(n=>Array(n).fill(null));currentVote=null;selected=null;locked=false;render();}
render();

</script>
</body>
</html>
