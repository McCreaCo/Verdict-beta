<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERDICT — Superpowers</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #09080a; color: #f0eaf8; font-family: Georgia, 'Times New Roman', serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  #app { width: 100%; max-width: 560px; min-height: 100vh; display: flex; flex-direction: column; }
  header { padding: 16px 20px 12px; border-bottom: 1px solid #22182a; display: flex; align-items: center; justify-content: space-between; background: #0e0b14; }
  .title { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; color: #5ad8a0; }
  .subtitle { font-size: 9px; color: #2a9060; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
  .counter { font-size: 10px; color: #2e2040; background: #14101c; border: 1px solid #22182a; border-radius: 16px; padding: 4px 10px; }
  .back-btn { background: transparent; border: 1px solid #22182a; border-radius: 8px; padding: 5px 10px; color: #3a2850; font-size: 11px; cursor: pointer; font-family: Georgia, serif; }
  #main { flex: 1; padding: 14px 0; }
  .core-q { text-align: center; font-size: 12px; color: #5ad8a0; font-style: italic; padding: 4px 20px 0; line-height: 1.4; }
  .bracket-cols { display: flex; gap: 3px; padding: 0 10px; }
  .bracket-col { display: flex; flex-direction: column; flex: 1; min-width: 0; }
  .col-label { font-size: 7px; letter-spacing: 1.5px; text-transform: uppercase; text-align: center; margin-bottom: 5px; }
  .col-matches { display: flex; flex-direction: column; justify-content: space-around; height: 380px; }
  .match-cell { border-radius: 5px; overflow: hidden; cursor: default; flex: 1; transition: border-color 0.2s; }
  .match-cell.active { border: 1px solid #5ad8a0 !important; background: #14101c !important; cursor: pointer; }
  .match-cell.done { border: 1px solid #2e1e2a !important; background: #0e0b14 !important; cursor: pointer; }
  .match-cell.empty { border: 1px solid #14101c; background: #09080a; }
  .match-row { display: flex; align-items: center; gap: 2px; padding: 2px 3px; transition: opacity 0.3s; }
  .match-row.loser { opacity: 0.22; }
  .match-row.winner { background: rgba(90,216,160,0.12); }
  .match-row .em { font-size: 8px; }
  .match-row .nm { font-size: 7px; color: #3a2850; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 400; }
  .match-row.winner .nm { color: #5ad8a0; font-weight: 700; }
  .match-divider { border: none; border-top: 1px solid #1e1428; margin: 0; }
  .tbd { padding: 2px 3px; font-size: 6px; color: #221830; }
  .vote-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #5ad8a0, #2a9060); border: none; border-radius: 12px; color: #09080a; font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: 1px; font-family: Georgia, serif; margin-top: 14px; }
  .vote-hint { font-size: 10px; color: #6a6478; text-align: center; margin-top: 6px; }
  #vote-screen { padding: 0 16px; animation: fadeUp 0.3s ease; }
  .vote-header { text-align: center; margin-bottom: 16px; }
  .round-label { font-size: 10px; letter-spacing: 3px; color: #5ad8a0; text-transform: uppercase; margin-bottom: 3px; }
  .vote-hint-text { font-size: 11px; color: #8a8298; letter-spacing: 1px; }
  .card { display: block; width: 100%; margin-bottom: 10px; border-radius: 14px; padding: 16px 18px; cursor: pointer; text-align: left; transition: all 0.25s; position: relative; overflow: hidden; border: 2px solid #22182a; background: #0e0b14; }
  .card.selected { border-color: #5ad8a0 !important; background: #1a1020 !important; transform: scale(1.01); }
  .card-inner { position: relative; z-index: 1; }
  .card-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
  .card-emoji { font-size: 34px; margin-top: 2px; flex-shrink: 0; }
  .card-meta { font-size: 9px; color: #2a9060; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
  .card-name { font-size: 18px; font-weight: 700; color: #d8d2e2; line-height: 1.2; margin-bottom: 2px; transition: color 0.2s; }
  .card.selected .card-name { color: #ffffff; }
  .card-from { font-size: 10px; color: #8a8298; font-style: italic; transition: color 0.2s; }
  .card.selected .card-from { color: #8a8298; }
  .card-tag { display: inline-block; margin-top: 8px; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; background: #22182a; color: #5ad8a0; letter-spacing: 1px; }
  .card.selected .card-tag { background: #5ad8a0; color: #09080a; }
  .card-stats { margin-top: 8px; font-size: 9px; color: #9a8aa0; letter-spacing: 0.5px; }
  .card.selected .card-stats { color: #9a8aa0; }
  .card-fact { font-size: 12px; color: #7e7888; line-height: 1.75; transition: color 0.2s; margin-top: 8px; }
  .card.selected .card-fact { color: #e8e2f0; }
  .card-arrow { font-size: 16px; color: #5ad8a0; margin-left: auto; flex-shrink: 0; }
  .card-pct { font-size: 20px; font-weight: 700; color: #5ad8a0; margin-top: 10px; }
  .card-pct span { font-size: 12px; font-weight: 400; color: #3a2850; margin-left: 6px; }
  .card-pct .check { color: #5ad8a0; margin-left: 8px; }
  .pct-bar { position: absolute; top: 0; left: 0; height: 100%; background: rgba(90,216,160,0.06); transition: width 0.9s cubic-bezier(.4,0,.2,1); z-index: 0; }
  .commit-box { padding: 14px 18px; background: #0e0b14; border: 1px solid #22182a; border-radius: 12px; text-align: center; animation: fadeUp 0.3s ease; }
  .commit-hint { font-size: 11px; color: #3a2850; margin-bottom: 10px; font-style: italic; }
  .commit-btn { padding: 12px 32px; background: linear-gradient(135deg, #5ad8a0, #2a9060); border: none; border-radius: 10px; color: #09080a; font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: 1px; font-family: Georgia, serif; }
  .result-box { padding: 16px 18px; background: #0e0b14; border: 1px solid #22182a; border-radius: 12px; text-align: center; margin-top: 2px; animation: fadeUp 0.3s ease; }
  .result-majority { font-size: 13px; color: #7ec8a0; font-weight: 700; letter-spacing: 1px; }
  .result-minority { font-size: 13px; color: #2a9060; font-weight: 700; letter-spacing: 1px; }
  .next-btn { width: 100%; margin-top: 14px; padding: 14px; background: linear-gradient(135deg, #5ad8a0, #2a9060); border: none; border-radius: 12px; color: #09080a; font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: 1px; font-family: Georgia, serif; }
  #champion-screen { text-align: center; padding: 36px 24px; animation: fadeUp 0.5s ease; }
  .champ-emoji { font-size: 76px; margin-bottom: 8px; }
  .champ-trophy { font-size: 11px; letter-spacing: 4px; color: #5ad8a0; text-transform: uppercase; margin-bottom: 8px; }
  .champ-name { font-size: 26px; font-weight: 700; color: #f0eaf8; margin-bottom: 4px; }
  .champ-from { font-size: 13px; color: #2a9060; font-style: italic; margin-bottom: 4px; }
  .champ-fact { font-size: 13px; color: #8a7d98; font-style: italic; max-width: 310px; margin: 14px auto 28px; line-height: 1.8; }
  .reset-btn { padding: 14px 32px; background: linear-gradient(135deg, #5ad8a0, #2a9060); border: none; border-radius: 12px; color: #09080a; font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: 1px; font-family: Georgia, serif; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  button:active { filter: brightness(0.88); }
</style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <a href="index.html" class="title" style="text-decoration:none;cursor:pointer" title="All brackets">VERDICT</a>
      <div class="subtitle">Pick One. Just One.</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="back-btn" id="back-btn" style="display:none" onclick="showBracket()">← Bracket</button>
      <div class="counter" id="counter">0/15</div>
    </div>
  </header>
  <div id="main"></div>
</div>
<script>

const ALL = [{"id": 0, "name": "Flight", "from": "The classic dream", "emoji": "🕊", "div": "The Big Four", "seed": 1, "stats": "", "fact": "The dream nearly everyone has had in their sleep — just lift off and go, no traffic, no walls, no ground. Flight is the most-wished-for power for a reason: it's pure freedom, and it turns the whole sky into somewhere you're allowed to be. The catch is it doesn't actually protect you from anything."}, {"id": 1, "name": "Super Speed", "from": "Faster than everything", "emoji": "💨", "div": "The Big Four", "seed": 2, "stats": "", "fact": "Move fast enough and you get everything else for free — dodge any hit, finish any homework, be anywhere before anyone notices you left. Super speed is secretly one of the most overpowered picks here; the real question is whether the world would just feel slow and lonely while everyone catches up."}, {"id": 2, "name": "Invisibility", "from": "Now you don't", "emoji": "👻", "div": "The Big Four", "seed": 3, "stats": "", "fact": "Slip out of sight whenever you want — the ultimate power for sneaking, hiding, and going exactly where you're not supposed to be. Invisibility is the mischief-maker's dream, but it comes with a dark thought every kid eventually has: what would you do if no one could ever see you?"}, {"id": 3, "name": "Super Strength", "from": "Lift anything", "emoji": "💪", "div": "The Big Four", "seed": 4, "stats": "", "fact": "Lift the car, break the wall, win every arm-wrestle on Earth. Super strength is the most straightforwardly heroic power — the one that lets you physically save someone pinned under something. A strong #4 stuck in a loaded division; in a weaker bracket it cruises."}, {"id": 4, "name": "Telekinesis", "from": "Move it with your mind", "emoji": "🌀", "div": "Mind Powers", "seed": 1, "stats": "", "fact": "Move anything with your mind — grab the remote, stop a falling glass, fling a bad guy across the room, all without lifting a finger. Telekinesis is secretly a dozen powers in one: it's flight, it's strength, it's the Force. The most flexible pick on the entire board."}, {"id": 5, "name": "Time Control", "from": "Stop the clock", "emoji": "⏳", "div": "Mind Powers", "seed": 2, "stats": "", "fact": "Freeze the world, rewind a mistake, fast-forward the boring parts. Time control might be the single most powerful thing here — and the loneliest, because a frozen world is a world with no one else in it. The scariest 'be careful what you wish for' on the list, which is why it's NOT seeded #1."}, {"id": 6, "name": "Teleportation", "from": "Blink anywhere", "emoji": "✨", "div": "Mind Powers", "seed": 3, "stats": "", "fact": "Blink from your bedroom to the other side of the planet with a thought — no airports, no waiting, no distance that matters anymore. Teleportation quietly beats flight at flight's own game, and the only real downside is the horror of getting the landing spot slightly wrong."}, {"id": 7, "name": "Telepathy", "from": "Read every mind", "emoji": "🧠", "div": "Mind Powers", "seed": 4, "stats": "", "fact": "Hear what everyone's really thinking and talk mind-to-mind across any distance. Telepathy is the most powerful social superpower — and the one most likely to ruin your life, because nobody actually wants to hear every thought everyone has about them. A fascinating, dangerous #4."}, {"id": 8, "name": "Shapeshifting", "from": "Become anyone", "emoji": "🦎", "div": "Body Powers", "seed": 1, "stats": "", "fact": "Become anyone or anything — a bird to fly, a fish to swim, a stranger to slip past a guard. Shapeshifting is the power that contains all the other powers, the ultimate cheat code. The only thing you risk losing is track of who you actually are."}, {"id": 9, "name": "Invulnerability", "from": "Nothing hurts you", "emoji": "🛡", "div": "Body Powers", "seed": 2, "stats": "", "fact": "Nothing can hurt you — no fall, no fire, no blade, no bad day at the bottom of the ocean. Invulnerability is the quiet pick that makes every other adventure survivable. Until you wonder what happens when everyone you love isn't invulnerable too."}, {"id": 10, "name": "Healing", "from": "Fix any wound", "emoji": "💚", "div": "Body Powers", "seed": 3, "stats": "", "fact": "Fix any wound on yourself or others, undo any injury, maybe never even age. Healing is the most genuinely good power here — the one that helps people instead of impressing them. It's the superpower that would actually make the world better, which is exactly why it deserves more respect than it gets."}, {"id": 11, "name": "Elasticity", "from": "Stretch forever", "emoji": "🔗", "div": "Body Powers", "seed": 4, "stats": "", "fact": "Stretch any part of you any distance — reach the top shelf, grab someone falling across the street, squeeze under a door. Elasticity sounds goofy until you realize how absurdly useful it is, which is exactly why it's the most underrated power in the bracket."}, {"id": 12, "name": "Control Fire", "from": "Flame on command", "emoji": "🔥", "div": "Elemental", "seed": 1, "stats": "", "fact": "Summon flame from your hands — warmth, light, and raw destructive power on demand. Fire is the most dramatic, most dangerous-feeling elemental power, the one that makes you feel unstoppable and a little scary. Just don't sneeze indoors."}, {"id": 13, "name": "Control Weather", "from": "Command the sky", "emoji": "🌩", "div": "Elemental", "seed": 2, "stats": "", "fact": "Call down rain on a drought, clear the sky for a birthday, throw a lightning bolt when you mean it. Weather control is god-tier in scale — you're not affecting one person, you're affecting a whole region. The most powerful pick almost nobody thinks to choose."}, {"id": 14, "name": "Talk to Animals", "from": "Speak to every creature", "emoji": "🐾", "div": "Elemental", "seed": 3, "stats": "", "fact": "Have a real conversation with every creature on Earth — your dog, the birds, the whale. Talking to animals is the warmest, most magical power here, the one a lot of kids would actually want most. It loses fights but wins hearts, and that's its own kind of strong."}, {"id": 15, "name": "Control Ice", "from": "Freeze the world", "emoji": "❄", "div": "Elemental", "seed": 4, "stats": "", "fact": "Freeze anything, build bridges and walls from thin air, skate across a pond you just made. Ice powers are the elegant cousin of fire — defensive, creative, quietly versatile. Elsa made an entire generation want this one specifically."}];
const R1 = [[0, 3], [1, 2], [4, 7], [5, 6], [8, 11], [9, 10], [12, 15], [13, 14]];
const COUNTS = [8, 4, 2, 1];
const NR = COUNTS.length, LASTR = NR-1, TOTAL = 15;
const RLABELS = ["Round of 16", "Quarterfinal", "Semifinal", "The Final"];
const COLLABELS = ["R16", "QF", "SF", "Final"];
const HEIGHTS = [30, 46, 74, 120];
const GAPS = [6, 18, 44, 0];
const DIVNAMES = ["The Big Four", "Mind Powers", "Body Powers", "Elemental"];
const ASK_ROOM = ["Which would you ACTUALLY pick — and which just sounds cool?", "Most fun vs. most useful: different answers?", "Which power would you trust yourself with... and which one wouldn't you?", "What's the first thing you'd do with the winner?", "Which 'weak' power is secretly overpowered?"];
let results = COUNTS.map(n=>Array(n).fill(null));
let currentVote=null, selected=null, locked=false, askPrompt='';

function getC(r,mi,slot){
  if(r===0){const idx=R1[mi][slot];return ALL[idx];}
  const prevMi=mi*2+slot, prevW=results[r-1][prevMi];
  if(prevW===null)return null;
  return ALL.find(c=>c.id===prevW);
}
function getCurrentRound(){for(let r=0;r<NR;r++){for(let mi=0;mi<COUNTS[r];mi++){if(results[r][mi]===null){const a=getC(r,mi,0),b=getC(r,mi,1);if(a&&b)return r;}}}return LASTR;}
function getNextActive(){const cr=getCurrentRound();for(let mi=0;mi<COUNTS[cr];mi++){if(results[cr][mi]===null){const a=getC(cr,mi,0),b=getC(cr,mi,1);if(a&&b)return{round:cr,mi};}}return null;}
function totalVotes(){return results.flat().filter(v=>v!==null).length;}
function fakeA(a,b){return Math.min(86,Math.max(20,50+(b.id-a.id)%17+(a.id%4)*2));}

function render(){
  const done=results[LASTR][0]!==null;
  if(done){const w=ALL.find(c=>c.id===results[LASTR][0]);renderChampion(w);return;}
  if(currentVote!==null){renderVote();return;}
  renderBracket();
}

function renderBracket(){
  document.getElementById('back-btn').style.display='none';
  const cr=getCurrentRound(),next=getNextActive();
  let html='<div class="core-q">If you could pick ONE, which power would you take?</div>';
  html+='<div class="bracket-cols">';
  for(let r=0;r<NR;r++){
    const count=COUNTS[r],maxH=HEIGHTS[r],gap=GAPS[r];
    html+='<div class="bracket-col"><div class="col-label" style="color:'+(r===cr?'#5ad8a0':'#2e2040')+'">'+COLLABELS[r]+'</div><div class="col-matches" style="gap:'+gap+'px">';
    for(let mi=0;mi<count;mi++){
      const a=getC(r,mi,0),b=getC(r,mi,1),winner=results[r][mi];
      const active=r===cr&&winner===null&&a&&b,done=winner!==null;
      const cls=active?'active':done?'done':'empty';
      const onclick=(active||done)?'onclick="startVote('+r+','+mi+')"':'';
      html+='<div class="match-cell '+cls+'" style="max-height:'+maxH+'px;'+(!active&&!done?'border:1px solid #14101c':'')+'" '+onclick+'>';
      [a,b].forEach((c,si)=>{
        if(!c){html+='<div class="tbd">&mdash;</div>';return;}
        const isW=winner===c.id,isL=done&&!isW;
        const nm=c.name.split(' ').slice(0,r===0?2:3).join(' ');
        html+=(si===1?'<hr class="match-divider">':'')+'<div class="match-row '+(isW?'winner':isL?'loser':'')+'"><span class="em">'+c.emoji+'</span><span class="nm">'+nm+'</span></div>';
      });
      html+='</div>';
    }
    html+='</div></div>';
  }
  html+='</div>';
  if(next)html+='<div style="padding:14px 16px 0"><button class="vote-btn" onclick="startVote('+next.round+','+next.mi+')">Vote Next Matchup &rarr;</button><div class="vote-hint">Tap any highlighted match to vote</div></div>';
  document.getElementById('main').innerHTML=html;
}

function startVote(round,mi){currentVote={round,mi};selected=null;locked=false;const w=results[round][mi];if(w!==null){const a=getC(round,mi,0);selected=(a&&a.id===w)?'a':'b';}render();}

function renderVote(){
  document.getElementById('back-btn').style.display='block';
  const o=currentVote,round=o.round,mi=o.mi,a=getC(round,mi,0),b=getC(round,mi,1);
  if(!a||!b){showBracket();return;}
  const pA=fakeA(a,b),pB=100-pA,majority=selected?(selected==='a'?pA:pB)>=50:false;
  const hint=!selected?"— Which power would you take? —":locked?"— Verdict locked! —":"— Tap to switch. Button to commit. —";
  let html='<div id="vote-screen"><div class="vote-header"><div class="round-label">'+RLABELS[round]+'</div><div class="vote-hint-text">'+hint+'</div></div>';
  [{side:'a',c:a,pct:pA},{side:'b',c:b,pct:pB}].forEach(function(o){
    const side=o.side,c=o.c,pct=o.pct,isSel=selected===side;
    html+='<div class="card'+(isSel?' selected':'')+'" onclick="selectCard(\''+side+'\')">';
    if(locked&&isSel)html+='<div class="pct-bar" style="width:'+pct+'%"></div>';
    html+='<div class="card-inner"><div class="card-top"><div class="card-emoji">'+c.emoji+'</div><div style="flex:1;min-width:0"><div class="card-meta">'+c.div+' · '+c.from+'</div><div class="card-name">'+c.name+'</div></div>'+(isSel&&!locked?'<div class="card-arrow">◀</div>':'')+'</div>';
    html+='<div class="card-tag">'+(c.seed===1?'#1 SEED':c.seed===2?'#2 SEED':c.seed===3?'#3 SEED':'#4 SEED')+'</div>';
    if(c.stats)html+='<div class="card-stats">📊 '+c.stats+'</div>';
    html+='<div class="card-fact">'+c.fact+'</div>';
    if(locked&&isSel)html+='<div class="card-pct">'+pct+'%<span>voted this power</span><span class="check">✓</span></div>';
    html+='</div></div>';
  });
  if(selected&&!locked)html+='<div class="commit-box"><div class="commit-hint">Still deciding? Tap the other card to compare.</div><button class="commit-btn" onclick="commitVote()">Lock In Verdict &rarr;</button></div>';
  if(locked){
    html+='<div class="result-box"><div class="'+(majority?'result-majority':'result-minority')+'">'+(majority?'✓ With the majority':'🔥 Against the crowd')+'</div><div class="ask-room" style="margin-top:14px;padding-top:14px;border-top:1px dashed #3a2850"><div style="font-size:9px;letter-spacing:3px;color:#2a9060;text-transform:uppercase;margin-bottom:6px">Ask the Room</div><div style="font-size:15px;color:#e8d8f0;font-style:italic;line-height:1.4">'+askPrompt+'</div></div></div><button class="next-btn" onclick="advance()">Vote Next Matchup &rarr;</button>';
  }
  html+='</div>';
  document.getElementById('main').innerHTML=html;
}

function selectCard(side){if(locked)return;selected=side;renderVote();}
function commitVote(){
  if(!selected||locked)return;
  locked=true;
  askPrompt=ASK_ROOM[Math.floor(Math.random()*ASK_ROOM.length)];
  const o=currentVote,round=o.round,mi=o.mi,a=getC(round,mi,0),b=getC(round,mi,1);
  results[round][mi]=selected==='a'?a.id:b.id;
  renderVote();
  document.getElementById('counter').textContent=totalVotes()+'/'+TOTAL;
}
function advance(){currentVote=null;locked=false;selected=null;render();}
function showBracket(){currentVote=null;selected=null;locked=false;render();}
function renderChampion(c){
  document.getElementById('back-btn').style.display='none';
  document.getElementById('main').innerHTML='<div id="champion-screen"><div style="font-size:44px;margin-bottom:6px">🏆</div><div class="champ-emoji">'+c.emoji+'</div><div class="champ-trophy">Your One Power</div><div class="champ-name">'+c.name+'</div><div class="champ-from">'+c.from+'</div><div style="display:inline-block;margin:10px 0 6px;padding:4px 16px;border-radius:20px;background:#5ad8a0;color:#09080a;font-size:11px;font-weight:700;letter-spacing:1px">YOUR VERDICT</div><div class="champ-fact">'+c.fact+'</div><button class="reset-btn" onclick="resetGame()">Run It Back</button></div>';
}
function resetGame(){results=COUNTS.map(n=>Array(n).fill(null));currentVote=null;selected=null;locked=false;render();}
render();

</script>
</body>
</html>
